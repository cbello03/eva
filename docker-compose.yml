services:
  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eva}
      POSTGRES_USER: ${POSTGRES_USER:-eva_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eva_123}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eva_admin} -d ${POSTGRES_DB:-eva}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # Backend (Django + Daphne)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend-eva
      dockerfile: Dockerfile
      target: dev
    environment:
      - SECRET_KEY=${SECRET_KEY:-django-insecure-dev-only-change-in-production}
      - DEBUG=${DEBUG:-True}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      - POSTGRES_DB=${POSTGRES_DB:-eva}
      - POSTGRES_USER=${POSTGRES_USER:-eva_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-eva_123}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    volumes:
      - ./backend-eva:/app
      - backend_venv:/app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Frontend (Next.js dev server)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend-eva
      dockerfile: Dockerfile
      target: dev
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend-eva:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      - backend

  # ---------------------------------------------------------------------------
  # Celery Worker
  # ---------------------------------------------------------------------------
  celery-worker:
    build:
      context: ./backend-eva
      dockerfile: Dockerfile
      target: dev
    command: uv run celery -A backend_eva worker -l info
    environment:
      - SECRET_KEY=${SECRET_KEY:-django-insecure-dev-only-change-in-production}
      - DEBUG=${DEBUG:-True}
      - POSTGRES_DB=${POSTGRES_DB:-eva}
      - POSTGRES_USER=${POSTGRES_USER:-eva_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-eva_123}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend-eva:/app
      - backend_venv:/app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  # ---------------------------------------------------------------------------
  # Celery Beat
  # ---------------------------------------------------------------------------
  celery-beat:
    build:
      context: ./backend-eva
      dockerfile: Dockerfile
      target: dev
    command: uv run celery -A backend_eva beat -l info
    environment:
      - SECRET_KEY=${SECRET_KEY:-django-insecure-dev-only-change-in-production}
      - DEBUG=${DEBUG:-True}
      - POSTGRES_DB=${POSTGRES_DB:-eva}
      - POSTGRES_USER=${POSTGRES_USER:-eva_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-eva_123}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend-eva:/app
      - backend_venv:/app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  backend_venv:
  frontend_node_modules:
  frontend_next:
